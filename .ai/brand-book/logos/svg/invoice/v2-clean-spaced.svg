<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 48">
  <rect width="80" height="48" fill="#0f172a"/>
  <!-- JT — slightly lower for better vertical centering with DIGITAL -->
  <text x="40" y="28" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="24" font-weight="700" fill="#F59E0B" letter-spacing="3">JT</text>
  <!-- DIGITAL — natural letter-spacing instead of forced textLength, bigger size -->
  <text x="40" y="38" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="7.5" font-weight="600" fill="#475569" letter-spacing="4">DIGITAL</text>
</svg>
