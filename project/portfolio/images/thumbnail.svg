<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <rect width="400" height="300" rx="12" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Ambient glow -->
  <circle cx="200" cy="100" r="100" fill="#3b82f6" opacity="0.06" filter="url(#glow)"/>
  <circle cx="340" cy="260" r="80" fill="#06b6d4" opacity="0.03" filter="url(#glow)"/>

  <!-- Subtle grid dots -->
  <g fill="#334155" opacity="0.4">
    <circle cx="40" cy="40" r="0.8"/><circle cx="80" cy="40" r="0.8"/><circle cx="120" cy="40" r="0.8"/><circle cx="160" cy="40" r="0.8"/><circle cx="200" cy="40" r="0.8"/><circle cx="240" cy="40" r="0.8"/><circle cx="280" cy="40" r="0.8"/><circle cx="320" cy="40" r="0.8"/><circle cx="360" cy="40" r="0.8"/>
    <circle cx="40" cy="260" r="0.8"/><circle cx="80" cy="260" r="0.8"/><circle cx="120" cy="260" r="0.8"/><circle cx="160" cy="260" r="0.8"/><circle cx="200" cy="260" r="0.8"/><circle cx="240" cy="260" r="0.8"/><circle cx="280" cy="260" r="0.8"/><circle cx="320" cy="260" r="0.8"/><circle cx="360" cy="260" r="0.8"/>
  </g>

  <!-- Code bracket icon -->
  <g transform="translate(200, 95)" filter="url(#iconShadow)">
    <!-- Left bracket -->
    <path d="M-30,-36 L-44,-36 C-50,-36 -54,-32 -54,-26 L-54,0 L-60,0 L-54,0 L-54,26 C-54,32 -50,36 -44,36 L-30,36"
          fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket -->
    <path d="M30,-36 L44,-36 C50,-36 54,-32 54,-26 L54,0 L60,0 L54,0 L54,26 C54,32 50,36 44,36 L30,36"
          fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center dot chain (fluent chain) -->
    <circle cx="-14" cy="0" r="4" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="4" fill="url(#accent)" opacity="0.7"/>
    <circle cx="14" cy="0" r="4" fill="url(#accent)" opacity="0.4"/>
    <!-- Inner glow -->
    <rect x="-28" y="-20" width="56" height="40" rx="6" fill="#3b82f6" opacity="0.04"/>
  </g>

  <!-- Title -->
  <text x="200" y="178" font-family="JetBrains Mono, Inter, system-ui, sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="url(#accent)">fluent-html</text>

  <!-- Tagline -->
  <text x="200" y="202" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#94a3b8" text-anchor="middle">Type-safe HTML builder for TypeScript</text>

  <!-- Feature pills -->
  <g font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500" text-anchor="middle">
    <rect x="28" y="224" width="74" height="24" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="65" y="240" fill="#3b82f6" opacity="0.9">Zero Deps</text>

    <rect x="112" y="224" width="80" height="24" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="152" y="240" fill="#3b82f6" opacity="0.9">Type-Safe</text>

    <rect x="202" y="224" width="70" height="24" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="237" y="240" fill="#3b82f6" opacity="0.9">HTMX 4</text>

    <rect x="282" y="224" width="88" height="24" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="326" y="240" fill="#3b82f6" opacity="0.9">SSR-Ready</text>
  </g>
</svg>
