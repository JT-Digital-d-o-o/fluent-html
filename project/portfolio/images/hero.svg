  <!-- Line numbers gutter -->
  <rect x="50" y="90" width="36" height="490" fill="#0f172a" opacity="0.3"/>

  <!-- Code content -->
  <!-- Line 1 -->
  <text x="60" y="116" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">1</text>
  <text x="96" y="116" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#c084fc">import</tspan><tspan fill="#e2e8f0"> { Div, H1, Button, P } </tspan><tspan fill="#c084fc">from</tspan><tspan fill="#a5f3fc"> 'fluent-html'</tspan>
  </text>

  <!-- Line 2 (blank) -->
  <text x="60" y="136" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">2</text>

