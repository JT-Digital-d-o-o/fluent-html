  <line x1="640" y1="118" x2="1160" y2="118" stroke="white" stroke-opacity="0.04"/>

  <!-- Rendered page preview -->
  <rect x="660" y="130" width="480" height="430" rx="8" fill="white" opacity="0.97"/>

  <!-- Page content: the rendered result -->
  <rect x="660" y="130" width="480" height="430" rx="8" fill="#f8fafc"/>

