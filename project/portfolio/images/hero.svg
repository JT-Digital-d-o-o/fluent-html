  </g>
  <rect x="640" y="50" width="520" height="40" rx="16" fill="#1e293b"/>
  <rect x="640" y="74" width="520" height="16" fill="#1e293b"/>
  <circle cx="666" cy="70" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="684" cy="70" r="5" fill="#eab308" opacity="0.7"/>
  <circle cx="702" cy="70" r="5" fill="#22c55e" opacity="0.7"/>
