  <text x="60" y="396" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">15</text>
  <text x="96" y="396" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">    .</tspan><tspan fill="#7dd3fc">rounded</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"lg"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

  <!-- Line 16 -->
  <text x="60" y="416" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">16</text>
  <text x="96" y="416" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">    .</tspan><tspan fill="#7dd3fc">shadow</tspan><tspan fill="#e2e8f0">()</tspan>
  </text>

  <!-- Line 17 -->
  <text x="60" y="436" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">17</text>
  <text x="96" y="436" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">).</tspan><tspan fill="#7dd3fc">padding</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"8"</tspan><tspan fill="#e2e8f0">).</tspan><tspan fill="#7dd3fc">maxW</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"4xl"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

  <!-- IDE autocomplete popup -->
