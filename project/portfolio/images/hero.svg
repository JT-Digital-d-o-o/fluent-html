  <text x="60" y="316" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">11</text>
  <text x="96" y="316" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">  </tspan><tspan fill="#22d3ee">Button</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"Get Started"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

  <!-- Line 12 -->
  <text x="60" y="336" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">12</text>
  <text x="96" y="336" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">    .</tspan><tspan fill="#7dd3fc">padding</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"x"</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#a5f3fc">"6"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

  <!-- Line 13 -->
  <text x="60" y="356" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">13</text>
  <text x="96" y="356" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">    .</tspan><tspan fill="#7dd3fc">background</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"blue-500"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

  <!-- Line 14 -->
  <text x="60" y="376" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">14</text>
  <text x="96" y="376" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">    .</tspan><tspan fill="#7dd3fc">textColor</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"white"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

