    <rect x="50" y="50" width="480" height="530" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="50" y="50" width="480" height="530" rx="16" fill="url(#card-shine)"/>
  </g>

  <!-- Editor title bar -->
