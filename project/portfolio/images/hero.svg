  <text x="60" y="156" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">3</text>
  <text x="96" y="156" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#c084fc">const</tspan><tspan fill="#22d3ee"> page</tspan><tspan fill="#e2e8f0"> = </tspan><tspan fill="#22d3ee">Div</tspan><tspan fill="#e2e8f0">(</tspan>
  </text>

  <!-- Line 4 -->
  <text x="60" y="176" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">4</text>
  <text x="96" y="176" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">  </tspan><tspan fill="#22d3ee">H1</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"Welcome"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

  <!-- Line 5 -->
  <text x="60" y="196" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">5</text>
  <text x="96" y="196" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">    .</tspan><tspan fill="#7dd3fc">textSize</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"3xl"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

  <!-- Line 6 -->
  <text x="60" y="216" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">6</text>
  <text x="96" y="216" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">    .</tspan><tspan fill="#7dd3fc">bold</tspan><tspan fill="#e2e8f0">(),</tspan>
  </text>

  <!-- Line 7 (blank) -->
  <text x="60" y="236" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">7</text>

  <!-- Line 8 -->
  <text x="60" y="256" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">8</text>
  <text x="96" y="256" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">  </tspan><tspan fill="#22d3ee">P</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"Build HTML with type safety"</tspan><tspan fill="#e2e8f0">)</tspan>
  </text>

  <!-- Line 9 -->
  <text x="60" y="276" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">9</text>
  <text x="96" y="276" font-family="JetBrains Mono, monospace" font-size="11">
    <tspan fill="#e2e8f0">    .</tspan><tspan fill="#7dd3fc">textColor</tspan><tspan fill="#e2e8f0">(</tspan><tspan fill="#a5f3fc">"gray-500"</tspan><tspan fill="#e2e8f0">),</tspan>
  </text>

  <!-- Line 10 (blank) -->
  <text x="60" y="296" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569">10</text>

