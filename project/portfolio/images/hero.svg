  <rect x="50" y="74" width="480" height="16" fill="#1e293b"/>
  <circle cx="76" cy="70" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="94" cy="70" r="5" fill="#eab308" opacity="0.7"/>
  <circle cx="112" cy="70" r="5" fill="#22c55e" opacity="0.7"/>
  <text x="290" y="75" font-family="JetBrains Mono, monospace" font-size="11" fill="#64748b" text-anchor="middle">page.view.ts</text>
