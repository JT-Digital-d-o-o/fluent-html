    <text x="240" y="440" font-family="JetBrains Mono, monospace" font-size="11" fill="#7dd3fc">shadow</text>
    <text x="340" y="440" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">() =&gt; Tag</text>
