    <circle cx="590" cy="280" r="2" fill="#06b6d4"/>
    <circle cx="585" cy="350" r="2.5" fill="#22d3ee"/>
    <circle cx="575" cy="420" r="2" fill="#3b82f6"/>
    <circle cx="600" cy="160" r="1.5" fill="#06b6d4"/>
    <circle cx="610" cy="310" r="2" fill="#22d3ee"/>
    <circle cx="565" cy="470" r="1.5" fill="#3b82f6"/>
