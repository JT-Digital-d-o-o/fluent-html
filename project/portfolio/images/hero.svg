    <text x="340" y="462" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">(css) =&gt; Tag</text>
    <text x="240" y="484" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">setHtmx</text>
    <text x="340" y="484" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">(hx) =&gt; Tag</text>
    <text x="240" y="506" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">setId</text>
    <text x="340" y="506" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">(id) =&gt; Tag</text>
    <text x="240" y="528" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">setClass</text>
    <text x="340" y="528" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">(cls) =&gt; Tag</text>
    <text x="240" y="550" font-family="JetBrains Mono, monospace" font-size="11" fill="#94a3b8">setAria</text>
    <text x="340" y="550" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">({}) =&gt; Tag</text>
  </g>


  <!-- === CENTER: Arrow / Transform === -->

