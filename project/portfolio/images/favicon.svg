<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)"/>

  <!-- Code brackets -->
  <g transform="translate(32, 30)">
    <!-- Left angle bracket < -->
    <path d="M-6,-12 L-18,0 L-6,12" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right angle bracket > -->
    <path d="M6,-12 L18,0 L6,12" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Fluent chain dots -->
  <g transform="translate(32, 50)">
    <circle cx="-8" cy="0" r="2.5" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="2.5" fill="url(#accent)" opacity="0.7"/>
    <circle cx="8" cy="0" r="2.5" fill="url(#accent)" opacity="0.4"/>
  </g>
</svg>
